#### general settings
name: cmp-sde
use_tb_logger: true
model: denoising
distortion: compensate
gpu_ids: [0]


sde:
  max_sigma: 50 
  T: 100
  schedule: cosine 
  eps: 0.005
  beta_start: 0.0001
  beta_end: 0.03
  s: 0.0008


degradation: # for some synthetic dataset that only have GTs
  # for denoising
  sigma: 25
  noise_type: G # Gaussian noise: G

  # for super-resolution
  scale: 4
 
