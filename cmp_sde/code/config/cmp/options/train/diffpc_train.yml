#### network structures
network_G:
  which_model_G: ConditionalNAFNetCMP
  setting:
    width: 32
    enc_blk_nums: [1, 1, 1, 28]
    middle_blk_num: 1
    dec_blk_nums: [1, 1, 1,1]

#### path
path:
  pretrain_model_G: ~ 
  strict_load: true
  resume_state: ~

#### training settings: learning rate scheme, loss
train:
  optimizer:  Lion # 
  lr_G: !!float 4e-5
  lr_scheme: TrueCosineAnnealingLR
  beta1: 0.9
  beta2: 0.99
  niter: 250000
  warmup_iter: -1  # no warm up
  lr_steps: [ 100000, 200000]
  lr_gamma: 0.5
  eta_min: !!float 1e-7

  # criterion
  is_weighted: False
  loss_type: l1 # +lpips # +ssim
  weight: 1.0

  manual_seed: 0
  val_freq: !!float 2e4

#### logger
logger:
  print_freq: 2000
  save_checkpoint_freq: !!float 2e4
